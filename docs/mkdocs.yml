site_name: SCADYS.io Technical Documentation
site_url: https://docs.scadys.io
# use_directory_urls: true
site_description: Documentation for SCADYS.io.

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - footnotes
  # - attr_list
  # - pymdownx.linktarget:
  #     enabled: true
  #     new_tab: true
  #     no_referrer: true


extra_javascript:
  - https://kit.fontawesome.com/a076d05399.js
  - assets/js/ext_links.js

theme:
  name: material
  logo: assets/images/site_logo.svg
  custom_dir: overrides
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.top
    - content.footnote.tooltips

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: https://SCADYS.io/contact/
      name: Contact Us

extra_css:
  - assets/css/custom.css
  - assets/css/left_nav.css

